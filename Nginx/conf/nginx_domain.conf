# 设置单个域名下多个目录,根据后缀不同进行访问
server
{
    listen 80;
    listen 443 ssl http2;
    server_name weigh.master-worker.com;
    index index.php index.html index.htm default.php default.htm default.html;
    # 主域名映射的目录,要用root
    root /apps/web/project-a;

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    #HTTP_TO_HTTPS_START
    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }

    ssl_certificate    /www/server/panel/vhost/cert/project-a/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/project-a/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;

    location / {
      try_files $uri $uri/ @router;
    }
    location @router {
      rewrite ^.*$ /index.html last;
    }
    # 其他API接口反向代理地址
    location /api-a/ {
      proxy_pass http://127.0.0.1:80/;
      proxy_set_header Host $host;
    }
    #禁止访问的文件或目录
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md) {
        return 404;
    }

    #一键申请SSL证书验证目录相关设置
    location ~ \.well-known{
        allow all;
    }

    #禁止在证书验证目录放入敏感文件
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$ {
        expires      30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    location ~ .*\.(js|css)?$ {
        expires      12h;
        error_log /dev/null;
        access_log /dev/null;
    }
    access_log  /apps/logs/project-a.log;
    error_log  /apps/logs/project-a.error.log;

    # 相同域名,只是通过后缀不通访问:
    # project-a:直接使用https://project-a
    # project-b:使用https://project-a/b
    location /b {
      # 注意是用alias,b项目放在project-a中,也可以放在project-a外面
      alias /apps/web/project-a/b/;
      index index.html index.htm;
      # 这是vue的配置,注意加上b的前缀
      # vue还要修改其他程序中的配置,否则会跳转到project-a中,详见nginx_domain_vue.conf
      try_files $uri $uri/ /b/index.html;
    }

    # b调用的api戒指
    location /api-b/ {
      proxy_pass http://127.0.0.1:81/;
      proxy_set_header Host $host;
    }
}